services:
  postgres:
    image: postgres:16
    container_name: open-webui-postgres
    restart: unless-stopped
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-openwebui}'
      - 'POSTGRES_USER=${POSTGRES_USER:-openwebui}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  qdrant:
    image: qdrant/qdrant
    container_name: open-webui-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - '6333:6333'

  tika:
    image: apache/tika:latest-full
    container_name: open-webui-tika
    restart: unless-stopped
    ports:
      - '9998:9998'

volumes:
  postgres_data: {}
  qdrant_data: {}
