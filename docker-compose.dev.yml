services:
  postgres:
    image: postgres:16
    container_name: open-webui-postgres
    restart: unless-stopped
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-openwebui}'
      - 'POSTGRES_USER=${POSTGRES_USER:-openwebui}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  qdrant:
    image: qdrant/qdrant
    container_name: open-webui-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - '6333:6333'

  # tika:
  #   image: apache/tika:latest-full
  #   container_name: open-webui-tika
  #   restart: unless-stopped
  #   ports:
  #     - '9998:9998'

  searxng:
    image: searxng/searxng:latest
    container_name: open-webui-searxng
    restart: unless-stopped
    ports:
      - '8888:8080'
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  minio:
    image: minio/minio:latest
    container_name: open-webui-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - 'MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}'
      - 'MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}'
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: create the bucket the S3 storage provider expects. The S3 provider
  # does NOT auto-create it, so without this the first file upload fails with
  # NoSuchBucket. Idempotent (--ignore-existing); exits 0 once done.
  createbuckets:
    image: minio/mc:latest
    container_name: open-webui-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/open-webui &&
      echo 'Bucket open-webui ready.'
      "
    restart: 'no'

  # Document extraction engine for RAG / file uploads. CPU image in dev (validates
  # OCR quality, which is GPU-independent); the PCAI Helm deployment uses the CUDA
  # image. Models download on first run into the docling_models volume (cached
  # across recreates). Tuning is via DOCLING_PARAMS in dev.ps1 / Admin Settings.
  docling:
    image: quay.io/docling-project/docling-serve-cpu:latest
    container_name: open-webui-docling
    restart: unless-stopped
    ports:
      - '5001:5001'
    environment:
      - DOCLING_SERVE_ENABLE_UI=true
      - HF_HOME=/models
      # Sync convert endpoint timeout (Open WebUI uses the sync route). Default is
      # 120s, which large/scanned PDFs exceed on the CPU image. Raised for dev;
      # the real fix for big files at scale is the CUDA image on PCAI.
      - DOCLING_SERVE_MAX_SYNC_WAIT=600
    volumes:
      - docling_models:/models

  valkey:
    image: valkey/valkey:8-alpine
    container_name: open-webui-valkey
    restart: unless-stopped
    command: ['valkey-server', '--save', '60', '1', '--loglevel', 'warning']
    ports:
      - '6379:6379'
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data: {}
  qdrant_data: {}
  minio_data: {}
  valkey_data: {}
  docling_models: {}
