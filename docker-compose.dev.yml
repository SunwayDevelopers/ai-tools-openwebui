services:
  postgres:
    image: postgres:16
    container_name: open-webui-postgres
    restart: unless-stopped
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-openwebui}'
      - 'POSTGRES_USER=${POSTGRES_USER:-openwebui}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  qdrant:
    image: qdrant/qdrant
    container_name: open-webui-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - '6333:6333'

  tika:
    image: apache/tika:latest-full
    container_name: open-webui-tika
    restart: unless-stopped
    ports:
      - '9998:9998'

  searxng:
    image: searxng/searxng:latest
    container_name: open-webui-searxng
    restart: unless-stopped
    ports:
      - '8888:8080'
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  minio:
    image: minio/minio:latest
    container_name: open-webui-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - 'MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}'
      - 'MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}'
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: open-webui-valkey
    restart: unless-stopped
    command: ['valkey-server', '--save', '60', '1', '--loglevel', 'warning']
    ports:
      - '6379:6379'
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data: {}
  qdrant_data: {}
  minio_data: {}
  valkey_data: {}
